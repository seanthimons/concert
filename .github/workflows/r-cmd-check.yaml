name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  r-cmd-check:
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    runs-on: ${{ matrix.config.os }}
    continue-on-error: ${{ matrix.config.experimental }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: ubuntu-latest, r: release, experimental: false }
          - { os: windows-latest, r: release, experimental: false }
          - { os: macos-latest, r: release, experimental: false }
          - { os: ubuntu-latest, r: devel, experimental: true }

    steps:
      - name: Checkout repository
        # actions/checkout v5 pinned by commit SHA for supply-chain stability.
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up R
        # r-lib/actions/setup-r v2 pinned by commit SHA.
        uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - name: Set up pandoc
        # r-lib/actions/setup-pandoc v2 pinned by commit SHA.
        uses: r-lib/actions/setup-pandoc@d3c5be51b12e724e68f33216ca3c148b66d5f0b6

      - name: Set up TinyTeX
        # r-lib/actions/setup-tinytex v2 pinned by commit SHA.
        uses: r-lib/actions/setup-tinytex@d3c5be51b12e724e68f33216ca3c148b66d5f0b6

      - name: Install package dependencies
        # r-lib/actions/setup-r-dependencies v2 pinned by commit SHA.
        uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Check package
        run: Rscript -e "rcmdcheck::rcmdcheck(args = '--as-cran', error_on = 'warning')"
